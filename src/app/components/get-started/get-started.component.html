<main class="get-started-page">
  <p class="brand-title">Printr Jorny</p>

  <section class="intro-panel">
    <h1>Create your profile</h1>
    <p class="intro-copy">Set up the profile and printer model shown on your dashboard.</p>
  </section>

  <form class="profile-form" #profileForm="ngForm" (ngSubmit)="createProfile()" (click)="closePrinterMenu()">
    <div class="picture-field">
      <div class="picture-preview" aria-hidden="true">
        <img *ngIf="profile.profilePicture" [src]="profile.profilePicture" alt="" />
        <span *ngIf="!profile.profilePicture">{{ profileInitials }}</span>
      </div>
      <div class="picture-actions">
        <label class="picture-button">
          <input type="file" accept="image/*" (change)="onProfilePictureSelected($event)" />
          <span>Choose profile picture</span>
        </label>
        <button *ngIf="profile.profilePicture" type="button" class="remove-picture-button" (click)="removeProfilePicture()">Remove</button>
      </div>
    </div>

    <label class="field">
      <span>Your name <span class="required-mark">*</span></span>
      <input
        type="text"
        name="userName"
        [(ngModel)]="profile.userName"
        autocomplete="name"
        placeholder="full name"
        required
      />
    </label>

    <label class="field">
      <span>3D printer model <span class="required-mark">*</span></span>
      <input type="text" class="select-hidden-input" name="printerModel" [(ngModel)]="profile.printerModel" required />
      <div class="custom-select" [class.is-open]="isPrinterMenuOpen" (click)="$event.stopPropagation()">
        <button type="button" class="custom-select-button" (click)="togglePrinterMenu()">
          {{ profile.printerModel || 'Select your printer' }}
        </button>
        <div class="custom-select-options" *ngIf="isPrinterMenuOpen">
          <div class="custom-select-group" *ngFor="let printerBrand of printerBrands">
            <p>{{ printerBrand.brand }}</p>
            <button
              type="button"
              class="custom-select-option"
              *ngFor="let model of printerBrand.models"
              [class.is-selected]="model === profile.printerModel"
              (click)="choosePrinterModel(model)"
            >
              {{ model }}
            </button>
          </div>
        </div>
      </div>
    </label>

    <label class="field" *ngIf="isCustomPrinterModelSelected">
      <span>Custom printer model <span class="required-mark">*</span></span>
      <input
        type="text"
        name="customPrinterModel"
        [(ngModel)]="customPrinterModel"
        autocomplete="off"
        placeholder="Enter your printer model"
        required
      />
    </label>

    <button type="submit" [disabled]="profileForm.invalid">Create profile</button>
  </form>
</main>
