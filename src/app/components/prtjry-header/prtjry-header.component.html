<header class="topbar">
  <section class="profile">
    <div class="avatar" aria-hidden="true">
      <img *ngIf="data.profilePicture; else initialsAvatar" [src]="data.profilePicture" alt="" />
      <ng-template #initialsAvatar>{{ initials }}</ng-template>
    </div>
    <div>
      <p class="eyebrow">Active profile</p>
      <h1>{{ data.userName }}</h1>
    </div>
    <div class="profile-settings" (click)="$event.stopPropagation()">
      <button type="button" class="settings-button" aria-label="Profile settings" (click)="toggleSettingsMenu()">
        <span class="settings-icon" aria-hidden="true"></span>
      </button>

      <div class="settings-menu" *ngIf="isSettingsMenuOpen">
        <button type="button" class="settings-menu-item" (click)="runMenuAction(editProfile)">Edit profile</button>
        <button type="button" class="settings-menu-item" (click)="runMenuAction(exportProfile)">Export profile</button>
        <button type="button" class="settings-menu-item" (click)="runMenuAction(switchProfile)">Change profile</button>
        <div class="settings-menu-row">
          <span>Theme</span>
          <button
            type="button"
            class="theme-switch"
            [class.is-light]="themeMode === 'light'"
            role="switch"
            [attr.aria-checked]="themeMode === 'light'"
            [attr.aria-label]="themeToggleLabel"
            (click)="toggleTheme.emit()"
          >
            <span class="theme-icon moon-icon" aria-hidden="true"></span>
            <span class="theme-track" aria-hidden="true">
              <span class="theme-thumb"></span>
            </span>
            <span class="theme-icon sun-icon" aria-hidden="true"></span>
          </button>
        </div>
        <button type="button" class="settings-menu-item github-menu-item" (click)="openGithubPage()">
          <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true">
            <path
              fill="currentColor"
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82A7.65 7.65 0 0 1 8 3.86c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
            />
          </svg>
          <span>Check us on GitHub</span>
        </button>
      </div>
    </div>
  </section>

  <section class="header-accent" aria-hidden="true">
    <span class="space-star star-one"></span>
    <span class="space-star star-two"></span>
    <span class="space-star star-three"></span>
    <span class="space-planet planet-one"></span>
    <span class="space-planet planet-two"></span>
    <span class="space-comet"></span>
  </section>

  <button type="button" class="printer-summary" aria-label="Open printer details" (click)="openPrinterDetails.emit()">
    <div class="printer-copy">
      <p class="printer-kicker">Current printer</p>
      <h2>{{ data.printerModel }}</h2>
      <span class="printer-status" *ngIf="!isLiveStatusDisabled" [ngClass]="printerStatusClass">
        <span class="printer-status-dot" aria-hidden="true"></span>
        {{ printerStatus.label }}
      </span>
      <small class="printer-status-detail" *ngIf="!isLiveStatusDisabled">{{ printerStatus.detail }}</small>
      <small class="printer-status-detail" *ngIf="isLiveStatusDisabled">Enable live status in profile settings.</small>
      <span class="printer-progress" *ngIf="!isLiveStatusDisabled && hasPrintProgress">
        <span class="printer-progress-fill" [style.width.%]="printProgress"></span>
      </span>
    </div>
    <span class="printer-icon" aria-hidden="true"></span>
  </button>

  <button type="button" class="add-print-action" (click)="addPrint.emit()">
    <span class="add-print-icon" aria-hidden="true">+</span>
    <span>Add print</span>
  </button>
</header>
