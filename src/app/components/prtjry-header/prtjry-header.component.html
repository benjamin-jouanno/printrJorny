<header class="topbar">
  <section class="profile">
    <div class="avatar" aria-hidden="true">BJ</div>
    <div>
      <p class="eyebrow">Active profile</p>
      <h1>{{ userName }}</h1>
    </div>
  </section>

  <section class="printer-summary" aria-label="Current printer">
    <div>
      <p class="eyebrow">3D printer</p>
      <h2>{{ printerName }}</h2>
    </div>
    <span class="status-pill">{{ printerStatus }}</span>
  </section>
</header>
